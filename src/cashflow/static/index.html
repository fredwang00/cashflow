<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cashflow</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <h1>cashflow</h1>
        <div class="month-nav">
            <button id="prev-month" aria-label="Previous month">&larr;</button>
            <span id="month-label"></span>
            <button id="next-month" aria-label="Next month">&rarr;</button>
        </div>
    </header>

    <section class="cards">
        <div class="card" id="burn-card">
            <h2>Monthly Burn</h2>
            <div class="big-number" id="burn-amount"></div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="burn-bar"></div>
            </div>
            <div class="card-detail" id="burn-detail"></div>
        </div>
        <div class="card" id="surplus-card">
            <h2>YTD Surplus</h2>
            <div class="big-number" id="surplus-amount"></div>
            <div class="card-detail" id="surplus-detail"></div>
        </div>
        <div class="card" id="review-card">
            <h2>Review Queue</h2>
            <div class="big-number" id="review-count"></div>
            <div class="card-detail" id="review-detail"></div>
        </div>
    </section>

    <section class="chart-container" id="category-container">
        <div class="chart-header">
            <h2>Spending by Category</h2>
            <div class="filter-buttons">
                <button class="cat-filter-btn active" data-filter="all">All</button>
                <button class="cat-filter-btn" data-filter="necessity">Necessities</button>
                <button class="cat-filter-btn" data-filter="want">Wants</button>
            </div>
        </div>
        <div id="category-chart-wrap">
            <canvas id="category-chart"></canvas>
        </div>
    </section>

    <section class="chart-container" id="trend-container">
        <div class="chart-header">
            <h2>Monthly Trend</h2>
            <div class="filter-buttons">
                <button class="trend-filter-btn active" data-view="total">Total</button>
                <button class="trend-filter-btn" data-view="baseline">Baseline</button>
                <button class="trend-filter-btn" data-view="oneoffs">One-offs</button>
            </div>
        </div>
        <div style="height: 300px;">
            <canvas id="trend-chart"></canvas>
        </div>
    </section>

    <section class="transactions">
        <h2>Transactions</h2>
        <table id="tx-table">
            <thead>
                <tr>
                    <th data-col="date">Date</th>
                    <th data-col="merchant">Merchant</th>
                    <th data-col="amount">Amount</th>
                    <th data-col="category">Category</th>
                    <th data-col="who">Who</th>
                </tr>
            </thead>
            <tbody id="tx-body"></tbody>
        </table>
    </section>

    <footer>
        <span id="freshness"></span>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
